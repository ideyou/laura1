<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Movie Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <img src="profile.avif" alt="Foto" class="avatar">

    <h1 class="title">Laura Silvana</h1>
    <p class="subtitle">Escolha seu gênero favorito 🎬</p>

    <div class="links">

      <a href="https://www.imdb.com/title/tt2911666/" target="_blank" class="acao">Ação: De volta ao jogo</a>
      </a>

      <a href="https://www.imdb.com/title/tt1375670/" target="_blank" class="comedia">Comédia: Gente Grande</a>
      
      </a>

      <a href="https://www.imdb.com/title/tt1457767/" target="_blank" class="terror">Terror: The Conjuring</a>

      </a>

      <a href="https://www.imdb.com/title/tt0120338/" target="_blank"  class="romance">Romance: Titanic</a>

      </a>

      <a href="https://www.imdb.com/title/tt0816692/" target="_blank" class="ficcao">Ficção Científica: Interestelar</a>
    </a>

      <a href="https://www.imdb.com/title/tt0114709/" target="_blank" class="animacao">Animação: Toy Story</a>
      </a>

    </div>

    <button class="btn btn-outline" onclick="toggleTheme()">
      Alternar Tema </button>

  </div>
  <!-- INTRO NETFLIX -->
<div id="intro">
  <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="logo-intro">
  <audio id="tudum" src="https://www.myinstants.com/media/sounds/netflix-intro-sound.mp3"></audio>
</div>

<script>
window.addEventListener("load", () => {
  const intro = document.getElementById("intro");
  const som = document.getElementById("tudum");

  // tocar som (alguns navegadores precisam de interação)
  setTimeout(() => {
    som.play().catch(() => {});
  }, 300);

  // remover intro depois de 3s
  setTimeout(() => {
    intro.classList.add("sumir");
    document.body.classList.add("filme-comecou");
  }, 3000);
});
</script>

  <script src="script.js"></script>
</body>

</html>
